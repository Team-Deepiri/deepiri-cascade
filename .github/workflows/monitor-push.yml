name: Push Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

env:
  ORG: team-deepiri
  CASCADE_REPO: deepiri-cascade

permissions:
  contents: read

jobs:
  check-pushes:
    runs-on: ubuntu-latest
    outputs:
      pushes_json: ${{ steps.check.outputs.pushes_json }}
    steps:
      - name: Restore push state
        uses: actions/cache@v4
        with:
          path: push_state.json
          key: push-state-${{ github.run_id }}
          restore-keys: |
            push-state-

      - name: Check for new default-branch commits
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import json
          import os
          import urllib.request

          org = os.environ["ORG"]
          token = os.environ["GITHUB_TOKEN"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def gh_get(url, params=None):
              if params:
                  query = "&".join(f"{k}={v}" for k, v in params.items())
                  url = f"{url}?{query}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read())

          state_file = "push_state.json"
          old_state = {}
          try:
              with open(state_file) as f:
                  old_state = json.load(f)
          except Exception:
              pass

          repos = []
          page = 1
          while True:
              try:
                  data = gh_get(
                      f"https://api.github.com/orgs/{org}/repos",
                      {"page": page, "per_page": 100, "type": "all"},
                  )
              except Exception:
                  break
              if not data:
                  break
              repos.extend(data)
              page += 1

          new_pushes = []
          current_state = {}

          for repo in repos:
              name = repo["name"]
              default_branch = repo.get("default_branch", "main")
              try:
                  commit = gh_get(
                      f"https://api.github.com/repos/{org}/{name}/commits/{default_branch}"
                  )
              except Exception:
                  continue
              sha = commit.get("sha")
              if not sha:
                  continue
              current_state[name] = sha
              if name in old_state and old_state[name] != sha:
                  new_pushes.append({"repo": name, "sha": sha, "trigger": "push"})
                  print(f"New push: {name}@{sha[:8]}")
              elif name not in old_state:
                  print(f"First seen HEAD for {name}: {sha[:8]}")

          pushes_json = json.dumps(new_pushes)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"pushes_json={pushes_json}\n")

          with open(state_file, "w") as f:
              json.dump(current_state, f)

          print(f"New pushes found: {len(new_pushes)}")
          EOF

      - name: Save push state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: push_state.json
          key: push-state-${{ github.run_id }}

  cascade:
    needs: check-pushes
    if: ${{ fromJson(needs.check-pushes.outputs.pushes_json).length > 0 }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.check-pushes.outputs.pushes_json) }}
    steps:
      - name: Trigger push cascade for ${{ matrix.repo }}
        run: |
          curl -X POST https://api.github.com/repos/${{ env.ORG }}/${{ env.CASCADE_REPO }}/dispatches \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "event_type": "cascade-trigger",
              "client_payload": {
                "repo": "${{ matrix.repo }}",
                "sha": "${{ matrix.sha }}",
                "trigger": "push"
              }
            }'
