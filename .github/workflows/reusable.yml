name: Reusable Cascade

on:
  workflow_call:
    inputs:
      repo:
        required: true
        type: string
      tag:
        required: true
        type: string

jobs:
  cascade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: team-deepiri

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install rich httpx gitpython tomli

      - name: Run cascade
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          deepiri-cascade cascade \
            --repo "${{ inputs.repo }}" \
            --tag "${{ inputs.tag }}" \
            --org team-deepiri \
            --bump-type patch \
            --no-confirm
